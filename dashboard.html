<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tommy's Budget Dashboard</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2128;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --green: #3fb950;
      --green-bg: #1b2a1e;
      --red: #f85149;
      --red-bg: #2d1117;
      --orange: #d29922;
      --orange-bg: #271f08;
      --blue: #58a6ff;
      --blue-bg: #0d1f30;
      --gray: #6e7681;
      --gray-bg: #1c2128;
      --purple: #a371f7;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 13px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .header-title { font-size: 17px; font-weight: 700; }
    .header-month { font-size: 13px; color: var(--muted); }
    .header-right { display: flex; gap: 8px; align-items: center; }

    .btn {
      padding: 6px 13px; border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface2); color: var(--text);
      cursor: pointer; font-size: 12px; font-weight: 500;
      transition: background .15s;
    }
    .btn:hover { background: #2d333b; }
    .btn-danger  { background: var(--red-bg);    border-color: var(--red);    color: var(--red); }
    .btn-danger:hover  { background: #3d1a1a; }
    .btn-primary { background: var(--blue-bg);   border-color: var(--blue);   color: var(--blue); }
    .btn-primary:hover { background: #1a3a5c; }
    .btn-edit-on { background: rgba(163,113,247,.15); border-color: var(--purple); color: var(--purple); }
    .btn-edit-on:hover { background: rgba(163,113,247,.25); }

    /* ── LAYOUT ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 18px 24px; }

    /* ── ALERTS ── */
    .alerts { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
    .alert-card { background: var(--red-bg); border: 1px solid var(--red); border-radius: 8px; padding: 11px 15px; flex: 1; min-width: 170px; }
    .alert-card.warn { background: var(--orange-bg); border-color: var(--orange); }
    .alert-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--red); margin-bottom: 3px; }
    .alert-card.warn .alert-label { color: var(--orange); }
    .alert-body { font-size: 14px; font-weight: 700; }
    .alert-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ── STATS ROW ── */
    .stats-row { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; margin-bottom: 14px; }
    @media(max-width:680px){ .stats-row { grid-template-columns: repeat(2,1fr); } }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 13px 15px; }
    .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 5px; }
    .stat-value { font-size: 21px; font-weight: 700; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 5px; }
    .c-green { color: var(--green); } .c-red { color: var(--red); }
    .c-blue  { color: var(--blue);  } .c-orange { color: var(--orange); }

    .progress-bar { background: var(--border); border-radius: 4px; height: 5px; margin-top: 7px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--green); border-radius: 4px; transition: width .4s; }

    /* ── SECTIONS ── */
    .section { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
    .sec-header { display: flex; align-items: center; justify-content: space-between; padding: 11px 15px; cursor: pointer; user-select: none; border-bottom: 1px solid var(--border); }
    .sec-header:hover { background: var(--surface2); }
    .sec-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); display: flex; align-items: center; gap: 7px; }
    .sec-badge { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 1px 7px; color: var(--muted); font-weight: 600; }
    .sec-right { display: flex; align-items: center; gap: 10px; }
    .sec-amount { font-size: 13px; font-weight: 700; }
    .chevron { color: var(--muted); transition: transform .2s; display: inline-block; }
    .chevron.open { transform: rotate(180deg); }
    .sec-body.collapsed { display: none; }

    /* ── BILL ROW ── */
    .bill-row {
      display: flex; align-items: center;
      padding: 9px 15px; border-bottom: 1px solid var(--border);
      gap: 10px; cursor: pointer; transition: background .1s;
    }
    .bill-row:last-child { border-bottom: none; }
    .bill-row:hover { background: var(--surface2); }
    .bill-row.is-paid { opacity: .5; }
    .bill-row.is-hold { opacity: .4; cursor: default; }
    .bill-row.no-click { cursor: default; }
    .bill-name { flex: 1; font-size: 13px; font-weight: 500; }
    .bill-meta { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .bill-due { font-size: 11px; color: var(--muted); min-width: 90px; text-align: right; }
    .bill-amount { font-size: 13px; font-weight: 700; min-width: 68px; text-align: right; }

    /* ── EDIT ICON ── */
    .edit-icon {
      width: 26px; height: 26px; border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--muted); font-size: 13px;
      border: 1px solid transparent;
      transition: all .15s; flex-shrink: 0;
    }
    .edit-icon:hover { background: var(--surface2); border-color: var(--border); color: var(--purple); }

    /* Add row button */
    .add-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 15px; color: var(--muted); font-size: 12px;
      cursor: pointer; border-top: 1px dashed var(--border);
      transition: background .1s, color .1s;
    }
    .add-row:hover { background: var(--surface2); color: var(--blue); }

    /* ── BADGES ── */
    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 10px; border-radius: 20px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      min-width: 78px; justify-content: center;
      white-space: nowrap; user-select: none;
      transition: transform .1s, opacity .15s;
    }
    .badge:not(.locked):hover { opacity: .75; }
    .badge:not(.locked):active { transform: scale(.93); }
    .badge-paid   { background: var(--green-bg);   color: var(--green);  border: 1px solid rgba(63,185,80,.35); }
    .badge-due    { background: var(--red-bg);      color: var(--red);    border: 1px solid rgba(248,81,73,.4); }
    .badge-hold   { background: var(--gray-bg);     color: var(--gray);   border: 1px solid var(--border); cursor: default; }
    .badge-income { background: rgba(63,185,80,.1); color: var(--green);  border: 1px solid rgba(63,185,80,.2); cursor: default; }
    .badge-auto   { background: var(--blue-bg);     color: var(--blue);   border: 1px solid rgba(88,166,255,.35); }

    /* ── UPCOMING ── */
    .upcoming-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap: 10px; padding: 13px; }
    .up-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; cursor: pointer; transition: background .1s; }
    .up-card:hover { background: #23292f; }
    .up-card.urgent { border-color: rgba(248,81,73,.5); }
    .up-card.paid   { border-color: rgba(63,185,80,.4); opacity: .6; }
    .up-date { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 3px; }
    .up-name { font-size: 12px; font-weight: 600; margin-bottom: 2px; }
    .up-amount { font-size: 17px; font-weight: 800; }
    .up-amount.urgent { color: var(--red); }
    .up-amount.paid   { color: var(--green); }
    .no-upcoming { padding: 20px; text-align: center; color: var(--muted); font-size: 13px; }

    /* ── ACCOUNTS ── */
    .accounts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(148px,1fr)); gap: 10px; padding: 13px; }
    .acc-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 11px; }
    .acc-name { font-size: 10px; color: var(--muted); font-weight: 600; margin-bottom: 5px; }
    .acc-balance { font-size: 16px; font-weight: 800; }
    .acc-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

    /* ── SUMMARY ── */
    .summary { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 17px 20px; margin-bottom: 10px; }
    .sum-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; color: var(--muted); margin-bottom: 13px; }
    .sum-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    .sum-item { text-align: center; }
    .sum-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .sum-val { font-size: 25px; font-weight: 800; }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.7); z-index: 500;
      align-items: center; justify-content: center; padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,.6);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 15px 18px; border-bottom: 1px solid var(--border);
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; line-height: 1; padding: 2px 6px; border-radius: 4px; }
    .modal-close:hover { background: var(--surface2); color: var(--text); }
    .modal-body { padding: 18px; display: flex; flex-direction: column; gap: 13px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); }
    .field input, .field select {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 8px 11px;
      color: var(--text); font-size: 13px;
      transition: border-color .15s; width: 100%;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--blue); }
    .field select option { background: var(--surface2); }
    .field-hint { font-size: 11px; color: var(--muted); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .modal-footer {
      display: flex; align-items: center; gap: 8px;
      padding: 13px 18px; border-top: 1px solid var(--border);
    }
    .modal-footer .spacer { flex: 1; }
    .modal-type-toggle { display: flex; gap: 6px; align-items: center; }
    .toggle-pill {
      padding: 4px 12px; border-radius: 20px; font-size: 11px; font-weight: 600;
      border: 1px solid var(--border); background: var(--surface2); color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .toggle-pill.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
    .toggle-pill.active-green { background: var(--green-bg); border-color: var(--green); color: var(--green); }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 15px;
      font-size: 13px; font-weight: 500;
      display: none; z-index: 999;
      animation: slideUp .2s ease;
    }
    .toast.show { display: flex; align-items: center; gap: 6px; }
    @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    .footer { text-align: center; padding: 16px; color: var(--muted); font-size: 11px; }

    /* ── ACCOUNT MODAL (2nd modal) ── */
    .acc-modal-fields { display: flex; flex-direction: column; gap: 13px; }

    /* ── ACCOUNTS V2 ── */
    .acct-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: var(--muted);
      padding: 10px 15px 5px; border-top: 1px solid var(--border);
    }
    .acct-group-title:first-child { border-top: none; }
    .acct-row {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 15px; border-bottom: 1px solid var(--border);
      transition: background .1s; cursor: default;
    }
    .acct-row:last-child { border-bottom: none; }
    .acct-row:hover { background: var(--surface2); }
    .acct-row-name { flex: 1; font-size: 13px; font-weight: 500; }
    .acct-row-bal  { font-size: 13px; font-weight: 700; min-width: 80px; text-align: right; }
    .acct-row-sub  { font-size: 11px; color: var(--muted); min-width: 110px; text-align: right; }
    .nw-grid { display: grid; grid-template-columns: repeat(5,1fr); gap: 10px; padding: 14px; }
    @media(max-width:760px){ .nw-grid { grid-template-columns: repeat(2,1fr); } }

    /* ── CALENDAR ── */
    .cal-header { display: grid; grid-template-columns: repeat(7,1fr); text-align: center; }
    .cal-dow { padding: 6px 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); border-top: 1px solid var(--border); border-left: 1px solid var(--border); margin: 0 14px 14px; border-radius: 6px; overflow: hidden; }
    .cal-cell { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); min-height: 82px; padding: 5px; position: relative; background: var(--surface); transition: background .1s; }
    .cal-cell.empty { background: var(--bg); }
    .cal-cell.today { box-shadow: inset 0 0 0 2px var(--blue); }
    .cal-cell.has-bills  { background: #1a1118; }
    .cal-cell.has-pay    { background: #131d15; }
    .cal-day  { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
    .cal-cell.today .cal-day { color: var(--blue); }
    .cal-pill {
      display: block; font-size: 9px; font-weight: 600;
      padding: 2px 5px; border-radius: 4px; margin-bottom: 2px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      cursor: pointer; transition: opacity .15s;
    }
    .cal-pill:hover { opacity: .75; }
    .cal-pill.due  { background: var(--red-bg);   color: var(--red);   border: 1px solid rgba(248,81,73,.3); }
    .cal-pill.paid { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,.25); opacity:.6; }
    .cal-pill.pay  { background: var(--green-bg); color: var(--green); border: 1px solid rgba(63,185,80,.4); cursor:default; }
    .cal-pill.more { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); cursor:default; }
    .cal-paycheck-input { display: flex; align-items: center; gap: 8px; padding: 10px 15px; border-top: 1px solid var(--border); font-size: 12px; color: var(--muted); }
    .cal-paycheck-input input { background: var(--surface2); border: 1px solid var(--border); border-radius: 5px; padding: 4px 9px; color: var(--text); font-size: 12px; }
    .cal-paycheck-input input:focus { outline: none; border-color: var(--blue); }

    /* ── BUDGET PLANNER ── */
    .planner-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 14px; }
    @media(max-width:680px){ .planner-grid { grid-template-columns: 1fr; } }
    .planner-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
    .planner-card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 10px; }
    .planner-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .planner-row:last-child { border-bottom: none; }
    .planner-row-name { flex: 1; font-weight: 500; }
    .planner-row-amt  { font-weight: 700; font-size: 13px; }
    .planner-total { display: flex; justify-content: space-between; padding-top: 8px; margin-top: 2px; border-top: 2px solid var(--border); font-weight: 700; font-size: 14px; }
    .planner-gap { text-align: center; padding: 16px; }
    .planner-gap-val { font-size: 36px; font-weight: 800; }
    .planner-gap-label { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .lever-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
    .lever-row:last-child { border-bottom: none; }
    .lever-name { flex: 1; }
    .lever-amt { font-weight: 700; color: var(--orange); }
    .period-header { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 8px; }
    .period-total { display: flex; justify-content: space-between; padding: 6px 0 0; margin-top: 4px; border-top: 1px solid var(--border); font-size: 12px; font-weight: 700; }
    .priority-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink:0; margin-right: 6px; }
  </style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="header">
  <div class="header-left">
    <span class="header-title">💰 Budget Dashboard</span>
    <span class="header-month" id="header-month"></span>
  </div>
  <div class="header-right">
    <button class="btn" onclick="exportData()">⬇ Export</button>
    <button class="btn" onclick="document.getElementById('import-file').click()">⬆ Import</button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn" onclick="toggleInactive()" id="btn-inactive">Show Inactive</button>
    <button class="btn" id="btn-edit" onclick="toggleEditMode()">✏️ Edit</button>
    <button class="btn btn-danger" onclick="resetMonth()">↺ Reset Month</button>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <div id="alerts"></div>
  <div class="stats-row" id="stats-row"></div>

  <div class="section">
    <div class="sec-header" onclick="toggleSection('upcoming')">
      <div class="sec-title">📅 Due This Week <span class="sec-badge" id="ct-upcoming">0</span></div>
      <span class="chevron open" id="chev-upcoming">▼</span>
    </div>
    <div class="sec-body" id="body-upcoming">
      <div class="upcoming-grid" id="upcoming-grid"></div>
    </div>
  </div>

  <div id="bill-sections"></div>

  <!-- Accounts V2 (dynamic) -->
  <div id="accounts-v2"></div>

  <!-- Cash Flow Calendar -->
  <div id="calendar-section"></div>

  <!-- Budget Planner -->
  <div id="planner-section"></div>

  <div class="summary" id="summary"></div>
  <div class="footer">Click any bill row to mark paid · ✏️ Edit to customize · Saves automatically</div>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Edit Bill</span>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field" style="grid-column:1/-1">
          <label>Name</label>
          <input type="text" id="f-name" placeholder="e.g. Netflix">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Amount ($/mo)</label>
          <input type="number" id="f-amount" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="field">
          <label>Category</label>
          <select id="f-cat">
            <option value="MANDATORY">🏠 MANDATORY</option>
            <option value="SYSTEM">💻 SYSTEM</option>
            <option value="MISC">🎯 MISC</option>
            <option value="MARNAYSHA">👪 MARNAYSHA</option>
            <option value="INVESTMENTS">📈 INVESTMENTS</option>
            <option value="INCOME">💚 INCOME</option>
          </select>
        </div>
      </div>
      <div class="field-row" id="expense-fields">
        <div class="field">
          <label>Due Date</label>
          <input type="text" id="f-dueday" placeholder="e.g. 15  or  1,15  or  biweekly">
          <span class="field-hint">Day of month, two days separated by comma, or "biweekly"</span>
        </div>
        <div class="field">
          <label>Payment Method</label>
          <input type="text" id="f-pay" placeholder="e.g. DCU Checking">
        </div>
      </div>
      <div class="field" id="income-note-field" style="display:none">
        <label>Note / Frequency</label>
        <input type="text" id="f-note" placeholder="e.g. Every 2 weeks, 15th monthly">
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f-status">
          <option value="due">! DUE — needs to be paid this month</option>
          <option value="paid">✓ PAID — confirmed done</option>
          <option value="auto">🔄 AUTOPAY — deducted automatically</option>
          <option value="hold">⏸ ON HOLD — inactive / paused</option>
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger" id="btn-delete" onclick="deleteCurrent()">🗑 Delete</button>
      <div class="spacer"></div>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveCurrent()">Save</button>
    </div>
  </div>

function getStatus(id) {
  if (state[id] !== undefined) return state[id];

}

// ════════════════════════════════════════════════════
// HELPERS
// ════════════════════════════════════════════════════

function fmt(n) { if (!n) return '$0.00'; return '$' + n.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,','); }
function ord(n) { const s=['th','st','nd','rd'], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }

function dueDayLabel(d) {
  if (!d && d !== 0) return 'No fixed date';
  if (d === 'biweekly') return 'Every 2 weeks';
  if (Array.isArray(d)) return d.map(ord).join(' & ') + ' of month';
  return ord(d) + ' of month';
}

function dueDayStr(d) {
  if (!d && d !== 0) return '';
  if (d === 'biweekly') return 'biweekly';
  if (Array.isArray(d)) return d.join(', ');
  return String(d);
}

function parseDueDay(s) {
  if (!s || !s.trim()) return null;
  const t = s.trim().toLowerCase();
  if (t === 'biweekly') return 'biweekly';
  const parts = t.split(',').map(x => parseInt(x.trim())).filter(n => !isNaN(n));
  if (parts.length === 0) return null;
  if (parts.length === 1) return parts[0];
  return parts;
}

function generateId() {
  return 'b_' + Date.now() + '_' + Math.random().toString(36).slice(2,6);
}

function upcomingBills() {
  const today = new Date().getDate();
  const result = [];
  DATA.filter(b => b.cat !== 'INCOME').forEach(b => {
    const s = getStatus(b.id);
    if (s === 'hold') return;
    if (!b.dueDay || b.dueDay === 'biweekly') return;
    const days = Array.isArray(b.dueDay) ? b.dueDay : [b.dueDay];
    days.forEach(d => {
      if (d >= today && d <= today + 7) result.push({ ...b, exactDay: d });
    });
  });
  return result.sort((a,b) => a.exactDay - b.exactDay);
}

function dayLabel(day) {
  const d = new Date(); d.setDate(day);
  return d.toLocaleDateString('en-US', { weekday:'short', month:'short', day:'numeric' });
}

  document.getElementById('f-amount').value  = bill ? (bill.amount || '') : '';
  document.getElementById('f-cat').value     = bill ? bill.cat    : 'MANDATORY';
  document.getElementById('f-dueday').value  = bill ? dueDayStr(bill.dueDay) : '';
  document.getElementById('f-pay').value     = bill ? (bill.pay  || '') : '';
  document.getElementById('f-note').value    = bill ? (bill.note || '') : '';

function saveCurrent() {
  const name   = document.getElementById('f-name').value.trim();
  const amount = parseFloat(document.getElementById('f-amount').value) || 0;
  const cat    = document.getElementById('f-cat').value;
  const dueDay = parseDueDay(document.getElementById('f-dueday').value);
  const pay    = document.getElementById('f-pay').value.trim();
  const note   = document.getElementById('f-note').value.trim();
  const status = document.getElementById('f-status').value;

  if (!name) { document.getElementById('f-name').focus(); return; }

  if (currentId) {
    // Update existing
    const idx = DATA.findIndex(b => b.id === currentId);
    if (idx !== -1) {
      DATA[idx] = { ...DATA[idx], name, amount, cat, dueDay, pay, note };
      DATA[idx].hold = (status === 'hold');
    }
    state[currentId] = status;
    toast('✅ Saved — ' + name);
  } else {
    // Create new
    const id = generateId();
    DATA.push({ id, name, amount, cat, dueDay, pay, note, hold: status === 'hold' });
    state[id] = status;
    toast('✅ Added — ' + name);

  saveData(); saveState(); closeModal(); render();
}

  if (!currentId) return;
  const bill = DATA.find(b => b.id === currentId);

  DATA = DATA.filter(b => b.id !== currentId);

  saveData(); saveState(); closeModal(); render();

// CASH FLOW CALENDAR
// ════════════════════════════════════════════════════

function getPaycheckDays(year, month) {
  const anchor = localStorage.getItem('budget_paycheck_anchor');
  if (!anchor) return [];
  const base = new Date(anchor + 'T12:00:00');
  if (isNaN(base)) return [];
  const days = new Set();
  // walk forward and backward by 2-week steps from anchor
  for (let step = -10; step <= 10; step++) {
    const d = new Date(base.getTime() + step * 14 * 86400000);
    if (d.getFullYear() === year && d.getMonth() === month) days.add(d.getDate());
  }
  return [...days].sort((a,b)=>a-b);
}

function renderCalendar() {
  const now     = new Date();
  const year    = now.getFullYear();
  const month   = now.getMonth();
  const today   = now.getDate();
  const anchor  = localStorage.getItem('budget_paycheck_anchor') || '';
  const monthLabel = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});

  const firstDow     = new Date(year, month, 1).getDay();
  const daysInMonth  = new Date(year, month+1, 0).getDate();
  const paycheckDays = new Set(getPaycheckDays(year, month));

  // map bill due days → bill list
  const billMap = {};
  DATA.filter(b => b.cat !== 'INCOME' && getStatus(b.id) !== 'hold').forEach(b => {
    if (!b.dueDay || b.dueDay === 'biweekly') return;
    const days = Array.isArray(b.dueDay) ? b.dueDay : [b.dueDay];
    days.forEach(d => {
      if (d >= 1 && d <= daysInMonth) {
        if (!billMap[d]) billMap[d] = [];
        billMap[d].push(b);
      }
    });
  });

  // Build cell HTML
  const DAYS_OF_WEEK = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let cells = '';
  // Empty leading cells
  for (let i = 0; i < firstDow; i++) cells += `<div class="cal-cell empty"></div>`;

  for (let d = 1; d <= daysInMonth; d++) {
    const bills    = billMap[d] || [];
    const hasPay   = paycheckDays.has(d);
    const isToday  = d === today;
    const hasBills = bills.some(b => getStatus(b.id) === 'due');
    let cls = '';
    if (isToday)  cls += ' today';
    if (hasBills) cls += ' has-bills';
    if (hasPay)   cls += ' has-pay';

    let pills = '';
    if (hasPay) {
      const payAmt = DATA.filter(b=>b.cat==='INCOME'&&b.id==='bayhealth').reduce((_,b)=>b.amount,0)||4000;
      pills += `<span class="cal-pill pay">+${fmt(payAmt/2)} pay</span>`;
    }
    const shown = bills.slice(0, hasPay ? 1 : 2);
    const extra = bills.length - shown.length;
    shown.forEach(b => {
      const s = getStatus(b.id);
      pills += `<span class="cal-pill ${s}" onclick="toggleStatus('${b.id}')" title="${b.name} ${fmt(b.amount)}">${b.name.length>10?b.name.slice(0,9)+'…':b.name}</span>`;
    });
    if (extra > 0) pills += `<span class="cal-pill more">+${extra} more</span>`;

    cells += `<div class="cal-cell${cls}"><div class="cal-day">${d}</div>${pills}</div>`;
  }

  const col = !!collapsed['calendar'];
  document.getElementById('calendar-section').innerHTML = `
    <div class="section">
      <div class="sec-header" onclick="toggleSection('calendar')">
        <div class="sec-title">📆 Cash Flow — ${monthLabel}</div>
        <span class="chevron ${col?'':'open'}" id="chev-calendar">▼</span>
      </div>
      <div class="sec-body ${col?'collapsed':''}" id="body-calendar">
        <div class="cal-paycheck-input">
          <span>BayHealth next paycheck date:</span>
          <input type="date" value="${anchor}" onchange="localStorage.setItem('budget_paycheck_anchor',this.value);renderCalendar()">
          <span style="color:var(--muted);font-size:11px">(used to show biweekly pay days on calendar)</span>
        </div>
        <div style="padding:0 14px 4px">
          <div class="cal-header">${DAYS_OF_WEEK.map(d=>`<div class="cal-dow">${d}</div>`).join('')}</div>
        </div>
        <div class="cal-grid">${cells}</div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════
// BUDGET PLANNER
// ════════════════════════════════════════════════════

function getPaycheckAmount() {
  return parseFloat(localStorage.getItem('budget_paycheck_amount')) || 2000;
}

function renderBudgetPlanner() {
  const income   = DATA.filter(b => b.cat === 'INCOME');
  const expenses = DATA.filter(b => b.cat !== 'INCOME' && getStatus(b.id) !== 'hold');
  const totalIn  = income.reduce((s,b) => s+b.amount, 0);
  const totalOut = expenses.reduce((s,b) => s+b.amount, 0);
  const gap      = totalIn - totalOut;
  const gapCls   = gap >= 0 ? 'c-green' : 'c-red';
  const gapSign  = gap >= 0 ? '+' : '−';

  // Priority buckets
  const criticalIds = ['mortgage','car_note_dcu','car_note_nihfcu','car_insurance','dcu_loan','loan_nihfcu'];
  const importantIds = ['cell_phone','dcu_cc','truist_cc_2756','truist_cc_3345','dover_cc','langley_cc','nihfcu_cc','taxes_federal','taxes_state','gas_car'];
  const critical  = expenses.filter(b => criticalIds.includes(b.id));
  const important = expenses.filter(b => importantIds.includes(b.id));
  const flexible  = expenses.filter(b => !criticalIds.includes(b.id) && !importantIds.includes(b.id) && b.cat !== 'INVESTMENTS');
  const invest    = expenses.filter(b => b.cat === 'INVESTMENTS');

  const priorityBuckets = [
    { label:'🔴 Critical',   color:'#f85149', bills: critical },
    { label:'🟡 Important',  color:'#d29922', bills: important },
    { label:'🟢 Flexible',   color:'#3fb950', bills: flexible },
    { label:'📈 Investments',color:'#58a6ff', bills: invest },
  ];

  // Paycheck period split (biweekly ~$2000 each paycheck)
  const p1Bills = expenses.filter(b => {
    const d = Array.isArray(b.dueDay)?b.dueDay[0]:b.dueDay;
    return typeof d==='number' && d >= 1 && d <= 15;
  });
  const p2Bills = expenses.filter(b => {
    const d = Array.isArray(b.dueDay)?b.dueDay[0]:b.dueDay;
    return typeof d==='number' && d > 15;
  });
  const noDueBills = expenses.filter(b => !b.dueDay || b.dueDay === 'biweekly');
  const p1Total = p1Bills.reduce((s,b)=>s+b.amount,0);
  const p2Total = p2Bills.reduce((s,b)=>s+b.amount,0);
  const paycheck = getPaycheckAmount();

  // Top levers (largest flexible/investment expenses)
  const levers = [...flexible,...invest].sort((a,b)=>b.amount-a.amount).slice(0,6);

  const col = !!collapsed['planner'];
  const pct = Math.min(Math.round(totalOut/totalIn*100),100);

  document.getElementById('planner-section').innerHTML = `
    <div class="section">
      <div class="sec-header" onclick="toggleSection('planner')">
        <div class="sec-title">🎯 Monthly Budget Planner</div>
        <div class="sec-right">
          <span class="sec-amount ${gapCls}">${gapSign}${fmt(Math.abs(gap))}/mo</span>
          <span class="chevron ${col?'':'open'}" id="chev-planner">▼</span>
        </div>
      </div>
      <div class="sec-body ${col?'collapsed':''}" id="body-planner">
        <div class="planner-grid">

          <!-- Income summary -->
          <div class="planner-card">
            <div class="planner-card-title">💚 Income Sources</div>
            ${income.map(b=>`<div class="planner-row" ${editMode?`onclick="openModal('${b.id}')" style="cursor:pointer"`:''}>
              <span class="planner-row-name">${b.name}</span>
              <span class="planner-row-amt c-green">${b.amount>0?'+'+fmt(b.amount):'Variable'}</span>
              ${editMode?`<span class="edit-icon" style="margin-left:4px" onclick="event.stopPropagation();openModal('${b.id}')">✏️</span>`:''}
            </div>`).join('')}
            <div class="planner-total">
              <span>Total / month</span>
              <span class="c-green">+${fmt(totalIn)}</span>
            </div>
          </div>

          <!-- Budget gap -->
          <div class="planner-card">
            <div class="planner-card-title">📊 Monthly Overview</div>
            <div class="planner-gap">
              <div class="planner-gap-val ${gapCls}">${gapSign}${fmt(Math.abs(gap))}</div>
              <div class="planner-gap-label">${gap>=0?'Monthly surplus':'Monthly shortfall'}</div>
            </div>
            <div class="planner-row" style="margin-top:4px">
              <span>Income</span><span class="c-green">+${fmt(totalIn)}</span>
            </div>
            <div class="planner-row">
              <span>Expenses</span><span class="c-red">−${fmt(totalOut)}</span>
            </div>
            <div style="margin-top:8px">
              <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:4px">
                <span>Budget used</span><span>${pct}%</span>
              </div>
              <div class="progress-bar" style="height:8px">
                <div class="progress-fill" style="width:${Math.min(pct,100)}%;background:${pct>100?'var(--red)':pct>80?'var(--orange)':'var(--green)'}"></div>
              </div>
            </div>
          </div>

          <!-- Expense by priority -->
          <div class="planner-card">
            <div class="planner-card-title">📋 Expenses by Priority</div>
            ${priorityBuckets.map(bucket => {
              if (!bucket.bills.length) return '';
              const total = bucket.bills.reduce((s,b)=>s+b.amount,0);
              return `<div style="margin-bottom:8px">
                <div style="font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;display:flex;justify-content:space-between">
                  <span>${bucket.label}</span><span>${fmt(total)}</span>
                </div>
                ${bucket.bills.map(b=>`<div class="planner-row" ${editMode?`onclick="openModal('${b.id}')" style="cursor:pointer"`:''}>
                  <div class="priority-dot" style="background:${bucket.color}"></div>
                  <span class="planner-row-name">${b.name}</span>
                  <span class="planner-row-amt">${fmt(b.amount)}</span>
                  ${editMode?`<span class="edit-icon" style="margin-left:4px" onclick="event.stopPropagation();openModal('${b.id}')">✏️</span>`:''}
                </div>`).join('')}
              </div>`;
            }).join('')}
          </div>

          <!-- Paycheck allocation -->
          <div class="planner-card">
            <div class="planner-card-title" style="display:flex;align-items:center;justify-content:space-between;gap:8px">
              <span>💸 Paycheck Allocation</span>
              <span style="display:flex;align-items:center;gap:5px;font-size:11px;font-weight:400;color:var(--muted)">
                Per paycheck: <input type="number" value="${paycheck}" step="100" min="0"
                  style="width:78px;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;color:var(--text);font-size:11px"
                  onchange="localStorage.setItem('budget_paycheck_amount',this.value);renderBudgetPlanner()">
              </span>
            </div>
            <div class="period-header">Paycheck 1 — Bills due 1st–15th</div>
            ${p1Bills.map(b=>`<div class="planner-row" ${editMode?`onclick="openModal('${b.id}')" style="cursor:pointer"`:''}>
              <span class="planner-row-name">${b.name}</span>
              <span style="font-size:11px;color:var(--muted);margin-right:6px">${ord(Array.isArray(b.dueDay)?b.dueDay[0]:b.dueDay)}</span>
              <span class="planner-row-amt">${fmt(b.amount)}</span>
              ${editMode?`<span class="edit-icon" style="margin-left:4px" onclick="event.stopPropagation();openModal('${b.id}')">✏️</span>`:''}
            </div>`).join('')}
            <div class="period-total">
              <span>Total</span>
              <span class="${p1Total>paycheck?'c-red':'c-green'}">${fmt(p1Total)} / ${fmt(paycheck)}</span>
            </div>

            <div style="margin-top:14px"></div>
            <div class="period-header">Paycheck 2 — Bills due 16th–31st</div>
            ${p2Bills.map(b=>`<div class="planner-row" ${editMode?`onclick="openModal('${b.id}')" style="cursor:pointer"`:''}>
              <span class="planner-row-name">${b.name}</span>
              <span style="font-size:11px;color:var(--muted);margin-right:6px">${ord(Array.isArray(b.dueDay)?b.dueDay[0]:b.dueDay)}</span>
              <span class="planner-row-amt">${fmt(b.amount)}</span>
              ${editMode?`<span class="edit-icon" style="margin-left:4px" onclick="event.stopPropagation();openModal('${b.id}')">✏️</span>`:''}
            </div>`).join('')}
            ${noDueBills.length ? `<div style="font-size:11px;color:var(--muted);padding:4px 0">${noDueBills.map(b=>b.name).join(', ')} — no fixed date</div>` : ''}
            <div class="period-total">
              <span>Total</span>
              <span class="${p2Total>paycheck?'c-red':'c-green'}">${fmt(p2Total)} / ${fmt(paycheck)}</span>
            </div>

            ${levers.length ? `<div style="margin-top:14px">
              <div class="planner-card-title" style="margin-bottom:6px">🔧 Cost-Cutting Levers</div>
              ${levers.map(b=>`<div class="lever-row">
                <span class="lever-name">${b.name}</span>
                <button class="btn" style="font-size:10px;padding:2px 8px" onclick="event.stopPropagation();openModal('${b.id}')">Edit</button>
                <span class="lever-amt" style="margin-left:8px">${fmt(b.amount)}</span>
              </div>`).join('')}
            </div>` : ''}
          </div>

        </div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════

function render() {
  renderHeader();
  renderAlerts();
  renderStats();
  renderUpcoming();
  renderBillSections();
  renderAccountsV2();
  renderCalendar();
  renderBudgetPlanner();
  renderSummary();
}

function renderHeader() {
  const label = new Date().toLocaleDateString('en-US',{month:'long',year:'numeric'});
  document.getElementById('header-month').textContent = '· ' + label;
}

function renderAlerts() {
  const cards = [];

  ACCTS.filter(a => a.type==='cc').forEach(a => {
    const avail = (a.limit||0) - (a.used||0);
    if (avail < 0) {
      cards.push(`<div class="alert-card">
        <div class="alert-label">🚨 Over Credit Limit</div>
        <div class="alert-body">${a.name}</div>
        <div class="alert-sub">Over by ${fmt(Math.abs(avail))} &nbsp;·&nbsp; Limit ${fmt(a.limit)}</div>
      </div>`);
    } else if (avail < 100) {
      cards.push(`<div class="alert-card warn">
        <div class="alert-label">⚠️ Near Credit Limit</div>
        <div class="alert-body">${a.name}</div>
        <div class="alert-sub">Only ${fmt(avail)} left &nbsp;·&nbsp; Limit ${fmt(a.limit)}</div>
      </div>`);
    }
  });

  const today = new Date().getDate();
  const overdue = DATA.filter(b => {
    if (b.cat === 'INCOME') return false;
    const s = getStatus(b.id); if (s !== 'due') return false;
    if (!b.dueDay || b.dueDay === 'biweekly' || Array.isArray(b.dueDay)) return false;
    return b.dueDay < today;
  });
  if (overdue.length) {
    cards.push(`<div class="alert-card">
      <div class="alert-label">⏰ Past Due Date — Not Marked Paid</div>
      <div class="alert-body">${overdue.length} bill${overdue.length>1?'s':''}</div>
      <div class="alert-sub">${overdue.map(b=>b.name).join(' · ')}</div>
    </div>`);
  }

  document.getElementById('alerts').innerHTML =
    cards.length ? `<div class="alerts">${cards.join('')}</div>` : '';
}

function renderStats() {
  const expenses = DATA.filter(b => b.cat !== 'INCOME');
  const active   = expenses.filter(b => getStatus(b.id) !== 'hold');
  const paid     = active.filter(b => getStatus(b.id) === 'paid' || getStatus(b.id) === 'auto');
  const paidAmt  = paid.reduce((s,b) => s+b.amount, 0);
  const totalAmt = active.reduce((s,b) => s+b.amount, 0);
  const pct = active.length ? Math.round(paid.length/active.length*100) : 0;

  const totalIncome = DATA.filter(b => b.cat === 'INCOME').reduce((s,b) => s+b.amount, 0);
  const netMonthly  = totalIncome - totalAmt;
  const netCls      = netMonthly >= 0 ? 'c-green' : 'c-red';
  const netSign     = netMonthly >= 0 ? '+' : '';

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Bills Confirmed</div>
      <div class="stat-value ${paid.length===active.length?'c-green':'c-blue'}">${paid.length} / ${active.length}</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="stat-sub">${pct}% complete this month</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Paid So Far</div>
      <div class="stat-value c-green">${fmt(paidAmt)}</div>
      <div class="stat-sub">of ${fmt(totalAmt)} total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Still Outstanding</div>
      <div class="stat-value ${totalAmt-paidAmt>0?'c-red':'c-green'}">${fmt(totalAmt-paidAmt)}</div>
      <div class="stat-sub">left to verify</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Monthly Net</div>
      <div class="stat-value ${netCls}">${netSign}${fmt(Math.abs(netMonthly)).replace('$',netMonthly<0?'−$':'$')}</div>
      <div class="stat-sub">${fmt(totalIncome)} in · ${fmt(totalAmt)} out</div>
    </div>`;
}

function renderUpcoming() {
  const upcoming = upcomingBills();
  document.getElementById('ct-upcoming').textContent = upcoming.length;
  const grid = document.getElementById('upcoming-grid');

  if (!upcoming.length) {
    grid.innerHTML = '<div class="no-upcoming">🎉 No bills due in the next 7 days</div>';
    return;
  }

  grid.innerHTML = upcoming.map(b => {
    const s   = getStatus(b.id);
    const cls = s === 'paid' ? 'paid' : 'urgent';
    return `<div class="up-card ${cls}" onclick="toggleStatus('${b.id}')">
      <div class="up-date">${dayLabel(b.exactDay)}</div>
      <div class="up-name">${b.name}</div>
      <div class="up-amount ${cls}">${fmt(b.amount)}</div>
      <div style="margin-top:7px">${badge(b.id)}</div>
    </div>`;
  }).join('');
}

function badge(id) {
  const s = getStatus(id);
  if (s === 'paid') return `<span class="badge badge-paid locked" onclick="event.stopPropagation();toggleStatus('${id}')" title="Click to unmark">✓ PAID</span>`;
  if (s === 'due')  return `<span class="badge badge-due"          onclick="event.stopPropagation();toggleStatus('${id}')" title="Click to mark paid">! DUE</span>`;
  if (s === 'auto') return `<span class="badge badge-auto"         onclick="event.stopPropagation();toggleStatus('${id}')" title="Autopay — click to confirm received">🔄 AUTOPAY</span>`;
  return `<span class="badge badge-hold locked">⏸ ON HOLD</span>`;
}

function editIcon(id) {
  return `<span class="edit-icon" onclick="event.stopPropagation();openModal('${id}')" title="Edit">✏️</span>`;
}

function renderBillSections() {
  let html = '';

  CAT_ORDER.forEach(cat => {
    let bills = DATA.filter(b => b.cat === cat);
    if (!showInactive) bills = bills.filter(b => getStatus(b.id) !== 'hold');

    const icon     = CAT_ICONS[cat] || '📋';
    const active   = bills.filter(b => getStatus(b.id) !== 'hold');
    const paid     = active.filter(b => getStatus(b.id) === 'paid' || getStatus(b.id) === 'auto');
    const totalAmt = active.reduce((s,b) => s+b.amount, 0);
    const col      = !!collapsed[cat];

    html += `
      <div class="section">
        <div class="sec-header" onclick="toggleSection('${cat}')">
          <div class="sec-title">${icon} ${cat} <span class="sec-badge">${paid.length}/${active.length} paid</span></div>
          <div class="sec-right">
            <span class="sec-amount">${fmt(totalAmt)}/mo</span>
            <span class="chevron ${col?'':'open'}" id="chev-${cat}">▼</span>
          </div>
        </div>
        <div class="sec-body ${col?'collapsed':''}" id="body-${cat}">
          ${bills.map(b => billRow(b)).join('')}
          ${editMode ? `<div class="add-row" onclick="openModal(null); document.getElementById('f-cat').value='${cat}'; updateModalFields()">＋ Add to ${cat}</div>` : ''}
        </div>
      </div>`;
  });

  // Income section
  const incomeBills = DATA.filter(b => b.cat === 'INCOME');
  const incomeTotal = incomeBills.reduce((s,b) => s+b.amount, 0);
  const incCol      = !!collapsed['INCOME'];

  html += `
    <div class="section">
      <div class="sec-header" onclick="toggleSection('INCOME')">
        <div class="sec-title">💚 INCOME <span class="sec-badge">${incomeBills.length} source${incomeBills.length!==1?'s':''}</span></div>
        <div class="sec-right">
          <span class="sec-amount" style="color:var(--green)">+${fmt(incomeTotal)}/mo</span>
          <span class="chevron ${incCol?'':'open'}" id="chev-INCOME">▼</span>
        </div>
      </div>
      <div class="sec-body ${incCol?'collapsed':''}" id="body-INCOME">
        ${incomeBills.map(b => `
          <div class="bill-row no-click" style="cursor:${editMode?'pointer':'default'}" ${editMode?`onclick="openModal('${b.id}')"`:''}>
            <div style="flex:1">
              <div class="bill-name">${b.name}</div>
              <div class="bill-meta">${b.note || (b.dueDay ? dueDayLabel(b.dueDay) : 'No fixed date')}</div>
            </div>
            <div class="bill-amount" style="color:var(--green)">${b.amount > 0 ? '+'+fmt(b.amount) : 'Variable'}</div>
            <span class="badge badge-income">INCOME</span>
            ${editMode ? editIcon(b.id) : ''}
          </div>`).join('')}
        ${editMode ? `<div class="add-row" onclick="openModal(null); document.getElementById('f-cat').value='INCOME'; updateModalFields()">＋ Add Income Source</div>` : ''}
      </div>
    </div>`;

  document.getElementById('bill-sections').innerHTML = html;
}

function billRow(b) {
  const s   = getStatus(b.id);
  const rowCls = s==='paid' ? 'is-paid' : s==='hold' ? 'is-hold' : '';
  const click  = s !== 'hold' ? `onclick="toggleStatus('${b.id}')"` : '';
  return `
    <div class="bill-row ${rowCls}" ${click}>
      <div style="flex:1">
        <div class="bill-name">${b.name}</div>
        <div class="bill-meta">${b.pay || ''}</div>
      </div>
      <div class="bill-due">${dueDayLabel(b.dueDay)}</div>
      <div class="bill-amount">${b.amount > 0 ? fmt(b.amount) : '—'}</div>
      ${badge(b.id)}
      ${editMode ? editIcon(b.id) : ''}
    </div>`;
}

// ── ACCOUNT MODAL ──────────────────────────────────────────
let currentAcctId = null;

function openAcctModal(id) {
  currentAcctId = id;
  const a = id ? ACCTS.find(x => x.id === id) : null;
  document.getElementById('acct-modal-title').textContent = a ? 'Edit — ' + a.name : 'Add Account';
  document.getElementById('af-delete-btn').style.display = a ? '' : 'none';
  document.getElementById('af-name').value    = a ? a.name  : '';
  document.getElementById('af-type').value    = a ? a.type  : 'checking';
  document.getElementById('af-balance').value = a && a.balance != null ? a.balance : '';
  document.getElementById('af-limit').value   = a ? (a.limit || '') : '';
  document.getElementById('af-used').value    = a ? (a.used  || '') : '';
  document.getElementById('af-loan-bal').value= a && a.type==='loan' ? a.balance : '';
  updateAcctModalFields();
  document.getElementById('acct-modal').classList.add('open');
  document.getElementById('af-name').focus();
}

function updateAcctModalFields() {
  const t = document.getElementById('af-type').value;
  document.getElementById('af-cc-fields').style.display    = t==='cc'   ? '' : 'none';
  document.getElementById('af-loan-field').style.display   = t==='loan' ? '' : 'none';
  document.getElementById('af-balance-field').style.display= (t==='cc'||t==='loan') ? 'none' : '';
}

function closeAcctModal() {
  document.getElementById('acct-modal').classList.remove('open');
  currentAcctId = null;
}

function saveAccount() {
  const name = document.getElementById('af-name').value.trim();
  const type = document.getElementById('af-type').value;
  if (!name) { document.getElementById('af-name').focus(); return; }

  let acct = { name, type };
  if (type === 'cc') {
    acct.limit   = parseFloat(document.getElementById('af-limit').value) || 0;
    acct.used    = parseFloat(document.getElementById('af-used').value)  || 0;
  } else if (type === 'loan') {
    acct.balance = parseFloat(document.getElementById('af-loan-bal').value) || 0;
  } else {
    acct.balance = parseFloat(document.getElementById('af-balance').value) || 0;
  }

  if (currentAcctId) {
    const idx = ACCTS.findIndex(x => x.id === currentAcctId);
    if (idx !== -1) ACCTS[idx] = { ...ACCTS[idx], ...acct };
    toast('✅ Account updated — ' + name);
  } else {
    acct.id = 'acct_' + Date.now();
    ACCTS.push(acct);
    toast('✅ Account added — ' + name);
  }
  saveAccounts(); closeAcctModal(); render();
}

function deleteAccount() {
  if (!currentAcctId) return;
  const a = ACCTS.find(x => x.id === currentAcctId);
  if (!confirm(`Delete "${a ? a.name : 'this account'}"?`)) return;
  ACCTS = ACCTS.filter(x => x.id !== currentAcctId);
  saveAccounts(); closeAcctModal(); render();
  toast('🗑 Account deleted');
}

document.getElementById('acct-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('acct-modal')) closeAcctModal();
});

// ── RENDER ACCOUNTS V2 ──────────────────────────────────────
function renderAccountsV2() {
  const now = new Date();
  const ts  = getAcctLastUpdated();
  const tsLabel = ts ? new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}) : 'never';

  const GROUPS = [
    { key:'liquid',  label:'Cash & Checking', icon:'🏛️', types:['checking','cash'] },
    { key:'savings', label:'Savings',          icon:'🏦', types:['savings'] },
    { key:'invest',  label:'Investments',      icon:'📈', types:['investment','crypto'] },
    { key:'cc',      label:'Credit Cards',     icon:'💳', types:['cc'] },
    { key:'loans',   label:'Loans & Debt',     icon:'🔴', types:['loan'] },
  ];

  // Net worth calcs
  const liqAmt  = ACCTS.filter(a=>['checking','cash','savings'].includes(a.type)).reduce((s,a)=>s+(a.balance||0),0);
  const invAmt  = ACCTS.filter(a=>['investment','crypto'].includes(a.type)).reduce((s,a)=>s+(a.balance||0),0);
  const ccDebt  = ACCTS.filter(a=>a.type==='cc').reduce((s,a)=>s+(a.used||0),0);
  const lnDebt  = ACCTS.filter(a=>a.type==='loan').reduce((s,a)=>s+(a.balance||0),0);
  const totDebt = ccDebt + lnDebt;
  const netWorth= liqAmt + invAmt - totDebt;
  const unpaid  = DATA.filter(b=>b.cat!=='INCOME'&&getStatus(b.id)!=='hold'&&getStatus(b.id)!=='paid').reduce((s,b)=>s+b.amount,0);
  const safe    = liqAmt - unpaid;

  const nwCards = [
    { label:'Liquid Cash',     val:liqAmt,  cls:liqAmt>2000?'c-green':'c-orange', prefix:'+' },
    { label:'Investments',     val:invAmt,  cls:'c-blue', prefix:'+' },
    { label:'Total Debt',      val:totDebt, cls:'c-red',  prefix:'−' },
    { label:'Net Worth',       val:netWorth,cls:netWorth>=0?'c-green':'c-red', prefix: netWorth>=0?'+':'−' },
    { label:'Safe to Spend',   val:safe,    cls:safe>=0?'c-green':'c-red', prefix: safe>=0?'':'−',
      sub: 'after unpaid bills' },
  ];

  let html = `<div class="section">
    <div class="sec-header" onclick="toggleSection('accounts')">
      <div class="sec-title">🏦 Accounts & Net Worth <span class="sec-badge">Updated: ${tsLabel}</span></div>
      <div class="sec-right">
        ${editMode ? `<button class="btn" style="font-size:11px;padding:4px 10px" onclick="event.stopPropagation();openAcctModal(null)">＋ Add</button>` : ''}
        <span class="chevron ${collapsed['accounts']?'':'open'}" id="chev-accounts">▼</span>
      </div>
    </div>
    <div class="sec-body ${collapsed['accounts']?'collapsed':''}" id="body-accounts">
      <div class="nw-grid">
        ${nwCards.map(c=>`<div class="stat-card">
          <div class="stat-label">${c.label}</div>
          <div class="stat-value ${c.cls}">${c.prefix!=='−'?'':c.prefix}${fmt(Math.abs(c.val))}</div>
          ${c.sub ? `<div class="stat-sub">${c.sub}</div>` : ''}
        </div>`).join('')}
      </div>
      ${GROUPS.map(g => {
        const accts = ACCTS.filter(a => g.types.includes(a.type));
        if (!accts.length) return '';
        return `<div class="acct-group-title">${g.icon} ${g.label}</div>` +
          accts.map(a => {
            if (a.type === 'cc') {
              const avail  = (a.limit||0) - (a.used||0);
              const pct    = Math.min(Math.round((a.used||0)/(a.limit||1)*100),100);
              const cls    = avail < 0 ? 'c-red' : avail < 100 ? 'c-orange' : 'c-green';
              const bar    = avail < 0 ? 'var(--red)' : avail < 100 ? 'var(--orange)' : 'var(--green)';
              const pctCls = pct >= 90 ? 'c-red' : pct >= 70 ? 'c-orange' : 'c-green';
              return `<div class="acct-row">
                <div class="acct-row-name">${a.name}</div>
                <div class="acct-row-sub">${fmt(a.used||0)} / ${fmt(a.limit||0)}</div>
                <div class="acct-row-bal ${cls}">${fmt(avail)} avail</div>
                <div style="font-size:13px;font-weight:800;min-width:40px;text-align:right" class="${pctCls}">${pct}%</div>
                ${editMode ? `<span class="edit-icon" onclick="openAcctModal('${a.id}')">✏️</span>` : ''}
              </div>
              <div style="padding:0 15px 6px;display:flex;align-items:center;gap:8px">
                <div class="progress-bar" style="flex:1"><div class="progress-fill" style="width:${pct}%;background:${bar}"></div></div>
                <span style="font-size:10px;color:var(--muted);min-width:50px">${pct}% utilized</span>
              </div>`;
            }
            if (a.type === 'loan') {
              return `<div class="acct-row">
                <div class="acct-row-name">${a.name}</div>
                <div class="acct-row-sub">amount owed</div>
                <div class="acct-row-bal c-red">−${fmt(a.balance||0)}</div>
                ${editMode ? `<span class="edit-icon" onclick="openAcctModal('${a.id}')">✏️</span>` : ''}
              </div>`;
            }
            const cls = (a.balance||0) >= 500 ? 'c-green' : (a.balance||0) > 0 ? '' : 'c-red';
            return `<div class="acct-row">
              <div class="acct-row-name">${a.name}</div>
              <div class="acct-row-bal ${cls}">${fmt(a.balance||0)}</div>
              ${editMode ? `<span class="edit-icon" onclick="openAcctModal('${a.id}')">✏️</span>` : ''}
            </div>`;
          }).join('');
      }).join('')}
    </div>
  </div>`;

  document.getElementById('accounts-v2').innerHTML = html;
}

function renderSummary() {
  const expenses    = DATA.filter(b => b.cat !== 'INCOME' && getStatus(b.id) !== 'hold');
  const totalExpOut = expenses.reduce((s,b) => s+b.amount, 0);
  const totalIncIn  = DATA.filter(b => b.cat === 'INCOME').reduce((s,b) => s+b.amount, 0);
  const net         = totalIncIn - totalExpOut;
  const netSign     = net >= 0 ? '+' : '−';
  const netCls      = net >= 0 ? 'c-green' : 'c-red';

  document.getElementById('summary').innerHTML = `
    <div class="sum-title">📊 Monthly Summary</div>
    <div class="sum-grid">
      <div class="sum-item">
        <div class="sum-label">Total Income</div>
        <div class="sum-val c-green">+${fmt(totalIncIn)}</div>
        <div class="stat-sub">${DATA.filter(b=>b.cat==='INCOME').length} income sources</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Total Expenses</div>
        <div class="sum-val c-red">−${fmt(totalExpOut)}</div>
        <div class="stat-sub">All active bills</div>
      </div>
      <div class="sum-item">
        <div class="sum-label">Monthly Net</div>
        <div class="sum-val ${netCls}">${netSign}${fmt(Math.abs(net))}</div>
        <div class="stat-sub">${net>=0?'Surplus':'Shortfall'} each month</div>
      </div>
    </div>`;
}

// ════════════════════════════════════════════════════
// NEW MONTH DETECTION
// ════════════════════════════════════════════════════

(function checkNewMonth() {
  const lastKey = localStorage.getItem('budget_last_key');
  const curKey  = monthKey();
  if (lastKey && lastKey !== curKey) {
    const now = new Date();
    if (now.getDate() <= 4) {
      setTimeout(() => {
        const label = now.toLocaleDateString('en-US',{month:'long',year:'numeric'});
        if (confirm(`🗓 New month! (${label})\n\nReset all bill statuses to DUE?`)) {
          state = {}; saveState();
        }
      }, 600);
    }
  }
  localStorage.setItem('budget_last_key', curKey);
})();

// ════════════════════════════════════════════════════
// EXPORT / IMPORT
// ════════════════════════════════════════════════════

function exportData() {
  const backup = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('budget_')) {
      backup[key] = localStorage.getItem(key);
    }
  }
  const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const d = new Date();
  a.download = `budget-backup-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup exported ✓');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const backup = JSON.parse(e.target.result);
      const keys = Object.keys(backup).filter(k => k.startsWith('budget_'));
      if (keys.length === 0) { alert('No budget data found in this file.'); return; }
      if (!confirm(`Restore ${keys.length} saved items? This will overwrite your current data.`)) return;
      keys.forEach(k => localStorage.setItem(k, backup[k]));
      location.reload();
    } catch(err) {
      alert('Invalid backup file.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

render();
</script>
